# MiningPlus - artifacts
# This file is merged into config.yml at runtime.
# If the same path exists in config.yml, config.yml wins unless override-config-yml is enabled.

artifacts:
  pity:
    # Guarantees one eligible artifact after this many rewarded, artifact-eligible
    # blocks without a find. Set to 0 to keep artifact drops purely random.
    blocks-without-artifact: 350
  codex:
    # Artifact items can be salvaged with /mining artifacts salvage for fragments.
    # Fragments are spent on repeatable research below.
    default-fragment-value: 1
    sets:
      surveyor:
        enabled: true
        display-name: "&#57F287Surveyor Codex"
        lore:
          - "&7Starter-route artifacts from old survey crews."
        artifacts:
          - rough-geode
          - coal-seal
          - survey-token
          - copper-compass
        effects:
          shard-multiplier: 0.04
          treasure-chance: 0.03
      geode:
        enabled: true
        display-name: "&#2b98fdGeode Codex"
        lore:
          - "&7Utility-vein relics that improve tool calibration."
        artifacts:
          - luminous-fossil
          - pressure-gauge
          - redstone-relay
        effects:
          pickaxe-xp-multiplier: 0.03
          artifact-chance: 0.04
      nether:
        enabled: true
        display-name: "&#ED4245Nether Codex"
        lore:
          - "&7Heat-scarred records from Nether routes."
        artifacts:
          - nether-slag
          - quartz-astrolabe
          - basalt-seal
        effects:
          money-multiplier: 0.03
          hazard-chance-reduction: 0.06
          hazard-damage-reduction: 0.06
      relic:
        enabled: true
        display-name: "&#EB459ERelic Codex"
        lore:
          - "&7Late-depth relics from ancient mining ledgers."
        artifacts:
          - emerald-tablet
          - netherite-sigil
          - ancient-core
          - deep-ledger-fragment
        effects:
          mining-xp-multiplier: 0.03
          points-multiplier: 0.05
          artifact-chance: 0.03
    research:
      survey-notes:
        enabled: true
        display-name: "&#57F287Survey Notes"
        icon: WRITABLE_BOOK
        unlock-level: 10
        cost: 4
        lore:
          - "&7Convert catalog fragments into practical route notes."
        reward:
          xp: 180.0
          shards: 140
          points: 25
      tool-calibration-notes:
        enabled: true
        display-name: "&#2b98fdTool Calibration Notes"
        icon: ANVIL
        unlock-level: 30
        required-sets:
          - surveyor
        cost: 8
        lore:
          - "&7Apply codex notes directly to your held pickaxe."
        reward:
          pickaxe-xp: 400.0
          shards: 120
      relic-index:
        enabled: true
        display-name: "&#FEE75CRelic Index"
        icon: ECHO_SHARD
        unlock-level: 65
        required-sets:
          - geode
        cost: 14
        lore:
          - "&7Cross-reference deep finds for money, points, and shards."
        reward:
          money: 3500.0
          points: 260
          shards: 700
          pickaxe-xp: 550.0
      master-codex:
        enabled: true
        display-name: "&#EB459EMaster Codex"
        icon: WRITTEN_BOOK
        unlock-level: 82
        required-sets:
          - relic
        cost: 22
        lore:
          - "&7A late-game research pass for fully committed miners."
        reward:
          xp: 1800.0
          pickaxe-xp: 1300.0
          money: 9000.0
          points: 650
          shards: 1600
          items:
            codex-bottle:
              material: EXPERIENCE_BOTTLE
              amount: 8
              name: "&#EB459ECodex Bottles"
              lore:
                - "&7Recovered insight bottled for later work."
  # Artifact items are tagged with Mining+ persistent data and can be priced
  # independently under sell.custom-prices.
  definitions:
    rough-geode:
      enabled: true
      display-name: "&#2b98fdRough Geode"
