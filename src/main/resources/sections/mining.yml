vein-miner:
  enabled: true
  # Maximum blocks broken per vein (hard-capped at 512).
  max-blocks: 64
  # Players must sneak to trigger vein mining.
  require-sneak: true
  # Apply durability damage to the tool for each vein block.
  damage-tool: true
  # Exhaustion added per vein block (0 = no hunger cost). 4.0 ~= one hunger point.
  hunger-per-block: 0.0
  # Include diagonal neighbours when expanding the vein.
  include-diagonals: true
  # Require a tool from the list below to vein mine.
  require-matching-tool: true
  tools:
    - WOODEN_PICKAXE
    - STONE_PICKAXE
    - IRON_PICKAXE
    - GOLDEN_PICKAXE
    - DIAMOND_PICKAXE
    - NETHERITE_PICKAXE
  # Block types that vein mining applies to.
  blocks:
    - COAL_ORE
    - DEEPSLATE_COAL_ORE
    - COPPER_ORE
    - DEEPSLATE_COPPER_ORE
    - IRON_ORE
    - DEEPSLATE_IRON_ORE
    - GOLD_ORE
    - DEEPSLATE_GOLD_ORE
    - REDSTONE_ORE
    - DEEPSLATE_REDSTONE_ORE
    - LAPIS_ORE
    - DEEPSLATE_LAPIS_ORE
    - DIAMOND_ORE
    - DEEPSLATE_DIAMOND_ORE
    - EMERALD_ORE
    - DEEPSLATE_EMERALD_ORE
    - NETHER_GOLD_ORE
    - NETHER_QUARTZ_ORE
    - ANCIENT_DEBRIS

# Random mining abilities. Each procs while mining a configured block when the player
# has the permission and has reached the unlock level.

auto-smelt:
  enabled: true
  # input-block-drop -> smelted-output. Applied to vanilla and custom drops.
  recipes:
    RAW_IRON: IRON_INGOT
    RAW_GOLD: GOLD_INGOT
    RAW_COPPER: COPPER_INGOT
    COPPER_ORE: COPPER_INGOT
    DEEPSLATE_COPPER_ORE: COPPER_INGOT
    IRON_ORE: IRON_INGOT
    GOLD_ORE: GOLD_INGOT
    ANCIENT_DEBRIS: NETHERITE_SCRAP

