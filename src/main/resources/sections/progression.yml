rewards:
  # Bonus money/commands when a player reaches a level. {player} and {level} are replaced.
  milestones:
    10:
      money: 1000.0
      commands: []
      message: "&aMilestone! &7You reached mining level &f{level}&7 and earned a bonus."
    25:
      money: 5000.0
      commands:
        - "give {player} diamond 16"
      message: "&bMilestone! &7Level &f{level}&7 reached."
    50:
      money: 25000.0
      commands: []
      message: "&dMilestone! &7Level &f{level}&7 reached."

# Per-block rewards. Key = Bukkit material name of the block being broken.
# xp:                  XP granted (defaults to levels.default-xp-per-block).
# money:               Optional Vault payout (min/max/chance 0.0-1.0).
# points:              Optional PointsPlus payout (min/max/chance 0.0-1.0).
# override-vanilla-drops: true removes the normal block drops and only uses 'drops'.
# drops:               Custom item drop table. affected-by-fortune adds bonus per fortune level.

