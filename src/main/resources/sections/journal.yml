# MiningPlus - journal and questline
# This file is merged into config.yml at runtime.
# If the same path exists in config.yml, config.yml wins unless override-config-yml is enabled.

journal:
  # Ordered story/progression chapters. Server owners can change names, icons,
  # lore, objectives, rewards, items, and commands.
  # Objective types: mine-blocks, mine-block, mine-group, reach-level, sell-items,
  # earn-points, earn-shards, earn-money, spend-shards, buy-perks,
  # find-treasures, find-artifacts, reach-pickaxe-level, refine-pickaxe,
  # find-tool-upgrades, find-tool-upgrade, survive-hazards.
  # Rewards can use item: for one configured item or items: for multiple keyed items.
  chapters:
    first-swing:
      display-name: "&#57F287First Swing"
      icon: WOODEN_PICKAXE
      lore:
        - "&7The mine recognizes steady hands before rich pockets."
        - "&7Break ore, learn the rhythm, and earn your first rank."
      objectives:
        mine-any:
          type: mine-blocks
          amount: 25
          description: "Mine 25 ore blocks"
        reach-level:
          type: reach-level
          amount: 3
          description: "Reach mining level 3"
      rewards:
        xp: 75.0
        money: 250.0
        points: 25
        shards: 50
        perk-points: 0
        item:
          material: TORCH
          amount: 16
          name: "&#57F287Miner's Torch Bundle"
          lore:
            - "&7A small starter reward from the mine journal."
        commands: []
    coal-ledger:
      display-name: "&#2b98fdCoal Ledger"
      icon: COAL
      required-chapters:
        - first-swing
      lore:
        - "&7Every settlement starts with fuel, receipts, and repeat work."
      objectives:
        coal:
          type: mine-group
          target: coal-ores
          amount: 15
          description: "Mine 15 coal ore"
        ore-work:
          type: mine-blocks
          amount: 50
          description: "Mine 50 ore blocks"
      rewards:
        xp: 150.0
        money: 500.0
        points: 50
        shards: 100
        perk-points: 1
        commands: []
    iron-contract:
      display-name: "&#FEE75CIron Contract"
      icon: RAW_IRON
      required-chapters:
        - coal-ledger
      lore:
        - "&7The foreman starts trusting miners who can work iron seams."
      objectives:
        level:
          type: reach-level
          amount: 10
          description: "Reach mining level 10"
        iron:
          type: mine-group
          target: iron-ores
          amount: 20
          description: "Mine 20 iron ore"
        points:
          type: earn-points
          amount: 100
          description: "Earn 100 mining points"
        perk:
          type: buy-perks
          amount: 1
          description: "Buy 1 mining perk upgrade"
        shards:
          type: earn-shards
          amount: 150
          description: "Earn 150 Mine Shards"
      rewards:
        xp: 300.0
        money: 1000.0
        points: 100
        shards: 200
        perk-points: 1
        commands: []
    utility-survey:
      display-name: "&#2b98fdUtility Survey"
      icon: REDSTONE
      required-chapters:
        - iron-contract
      lore:
        - "&7Redstone and lapis teach miners to read the mine, not just strip it."
      objectives:
        level:
          type: reach-level
          amount: 15
          description: "Reach mining level 15"
        utility:
          type: mine-group
          target: utility-ores
          amount: 45
          description: "Mine 45 copper, redstone, or lapis ore"
        pickaxe:
          type: reach-pickaxe-level
          amount: 5
          description: "Raise any mining pickaxe to level 5"
        shards:
          type: earn-shards
          amount: 400
          description: "Earn 400 Mine Shards"
      rewards:
        xp: 450.0
        money: 1500.0
        points: 150
        shards: 250
        perk-points: 1
        commands: []
    treasure-sense:
