# MiningPlus - abilities and mining events
# This file is merged into config.yml at runtime.
# If the same path exists in config.yml, config.yml wins unless override-config-yml is enabled.

abilities:
  # Breaks a cube of nearby configured blocks (radius = magnitude). Only affects blocks
  # that have a 'blocks:' reward entry, so it never destroys player builds.
  explosive:
    enabled: true
    chance: 0.035
    unlock-level: 20
    permission: miningplus.ability.explosive
    magnitude: 1
  # Grants Haste while mining. magnitude = effect level, duration-ticks = how long (20 = 1s).
  haste:
    enabled: true
    chance: 0.08
    unlock-level: 5
    permission: miningplus.ability.haste
    magnitude: 2
    duration-ticks: 120
  # Multiplies the XP from a mined block. magnitude = multiplier.
  bonus-xp:
    enabled: true
    chance: 0.08
    unlock-level: 1
    permission: miningplus.ability.bonusxp
    magnitude: 2.0
  # Reveals a few nearby rewarded ore blocks with client-side particles. magnitude = scan radius.
  ore-sense:
    enabled: true
    chance: 0.025
    unlock-level: 25
    permission: miningplus.ability.oresense
    magnitude: 7
  # Grants brief Resistance while mining. magnitude = effect level, duration-ticks = how long.
  stoneguard:
    enabled: true
    chance: 0.025
    unlock-level: 35
    permission: miningplus.ability.stoneguard
    magnitude: 1
    duration-ticks: 100

