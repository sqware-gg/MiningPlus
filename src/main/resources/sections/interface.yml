# MiningPlus - feedback, GUI, and messages
# This file is merged into config.yml at runtime.
# If the same path exists in config.yml, config.yml wins unless override-config-yml is enabled.

feedback:
  # High-polish player feedback using Paper's registry-backed 26.1.2 sound and particle keys.
  # Types accept namespaced keys such as minecraft:vault_connection and minecraft:block.amethyst_block.chime.
  enabled: true
  mining:
    enabled: true
    # Throttle routine mining cues so fast mining stays satisfying without becoming noisy.
    cooldown-ticks: 8
    action-bar: ""
    sound:
      enabled: true
      type: "minecraft:block.amethyst_block.hit"
      volume: 0.22
      pitch: 1.5
    particles:
      enabled: true
      type: "minecraft:dust_plume"
      count: 3
      offset: 0.18
      speed: 0.01
  artifact:
    enabled: true
    action-bar: "&#FEE75CArtifact found: &f{artifact}"
    title:
      enabled: true
      text: "&#FEE75CArtifact Found"
      subtitle: "&f{artifact}"
      fade-in-ticks: 5
      stay-ticks: 35
      fade-out-ticks: 10
    sound:
      enabled: true
      type: "minecraft:block.amethyst_block.chime"
      volume: 1.0
      pitch: 1.2
    particles:
      enabled: true
      type: "minecraft:vault_connection"
      count: 32
      offset: 0.45
      speed: 0.03
  sell:
    enabled: true
    action-bar: "&7Sold &f{items} &7items for &#57F287{money}"
    sound:
      enabled: true
      type: "minecraft:entity.experience_orb.pickup"
      volume: 0.65
      pitch: 1.25
    particles:
      enabled: true
      type: "minecraft:happy_villager"
      count: 12
      offset: 0.25
      speed: 0.02
  refine:
    enabled: true
    action-bar: "&#2b98fdPickaxe refined: &f+{gained} XP"
    title:
      enabled: true
      text: "&#2b98fdPickaxe Refined"
      subtitle: "&f+{gained} XP"
      fade-in-ticks: 4
      stay-ticks: 25
      fade-out-ticks: 8
    sound:
      enabled: true
      type: "minecraft:block.anvil.use"
      volume: 0.9
      pitch: 1.35
    particles:
      enabled: true
      type: "minecraft:electric_spark"
      count: 28
      offset: 0.35
      speed: 0.04
  journal:
    enabled: true
    action-bar: "&#57F287Journal chapter claimed: &f{chapter}"
    title:
      enabled: true
      text: "&#57F287Chapter Complete"
      subtitle: "&f{chapter}"
      fade-in-ticks: 5
      stay-ticks: 40
      fade-out-ticks: 10
    sound:
      enabled: true
      type: "minecraft:ui.toast.challenge_complete"
      volume: 0.9
      pitch: 1.15
    particles:
      enabled: true
      type: "minecraft:firework"
      count: 36
      offset: 0.5
      speed: 0.04
  shop:
    enabled: true
    action-bar: "&#57F287Purchased &f{item} &7- balance: &f{balance} Mine Shards"
    sound:
      enabled: true
      type: "minecraft:entity.villager.yes"
      volume: 0.8
      pitch: 1.15
    particles:
      enabled: true
      type: "minecraft:happy_villager"
      count: 16
      offset: 0.3
      speed: 0.02
  level-up:
    enabled: true
    action-bar: "&#57F287Mining level {level} &7- {rank}"
    title:
      enabled: true
      text: "&#57F287Mining Level {level}"
      subtitle: "&7{rank}"
      fade-in-ticks: 5
      stay-ticks: 45
      fade-out-ticks: 12
    sound:
      enabled: true
      type: "minecraft:entity.player.levelup"
      volume: 1.0
      pitch: 1.0
    particles:
      enabled: true
      type: "minecraft:totem_of_undying"
      count: 32
      offset: 0.55
      speed: 0.06

gui:
  open-with-pickaxe-right-click:
    enabled: true
    # If true, right-clicking ordinary blocks with a pickaxe opens the menu.
    # Interactable blocks are ignored unless the player is sneaking.
    blocks: true
    # Lets offhand block placement win over the mining menu. This prevents
